<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>退运清关商品数据分析表</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-title">大数据平台</div>
        </div>
        <nav class="primary-nav">
          <a href="#" class="nav-item active">销售分析</a>
          <a href="#" class="nav-item">进销存分析</a>
          <a href="#" class="nav-item">库存分析</a>
          <a href="#" class="nav-item">顾客分析</a>
          <a href="#" class="nav-item">采购分析</a>
          <a href="#" class="nav-item">提货分析</a>
          <a href="#" class="nav-item">风险管控</a>
          <a href="#" class="nav-item">离线分析</a>
        </nav>
        <div class="topbar-actions">
          <div class="header-search">
            <span class="search-icon">⌕</span>
            <input type="text" value="" placeholder="搜索" />
          </div>
          <button class="icon-button" aria-label="通知">◦</button>
          <button class="icon-button" aria-label="全屏">⤢</button>
          <div class="avatar-badge">cdf</div>
        </div>
      </header>

      <main class="page-body">
        <section class="page-banner">
          <div class="crumb-row">
            <span class="crumb-pill active">退运清关商品数据分析表</span>
          </div>
          <div class="banner-main">
            <div>
              <h1>退运清关商品数据分析表</h1>
              <p>基于 EOP、NCC、CIBO 销售与库存信息，支撑北京机场店退运逆向出口清关分析。</p>
            </div>
            <div class="banner-tag-group">
              <span class="banner-tag">单日查询</span>
              <span class="banner-tag">门店/店面联动</span>
              <span class="banner-tag">多源订单映射</span>
            </div>
          </div>
        </section>

        <section class="filter-card card">
          <div class="card-header">
            <div>
              <h2>筛选条件</h2>
              <p>默认全部选中，可按单日、门店、店面及商品维度组合筛选。</p>
            </div>
          </div>
          <div class="filter-grid">
            <label class="field field-date">
              <span class="field-label">日期</span>
              <input id="date-filter" class="date-input" type="date" />
            </label>
            <div class="field">
              <span class="field-label">门店</span>
              <div id="store-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">店面</span>
              <div id="shop-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">大类</span>
              <div id="category-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">柜组</span>
              <div id="counter-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">品牌</span>
              <div id="brand-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">商品编码</span>
              <div id="productCode-filter"></div>
            </div>
            <div class="field">
              <span class="field-label">商品条码</span>
              <div id="barcode-filter"></div>
            </div>
          </div>
          <div class="card-actions filter-actions">
            <button id="reset-button" class="btn btn-secondary" type="button">重置</button>
            <button id="query-button" class="btn btn-primary" type="button">查询</button>
          </div>
        </section>

        <section class="table-card card">
          <div class="card-header report-header">
            <div>
              <h2>结果明细</h2>
              <p>展示 EOP、NCC、CIBO 三套单据信息与库存、价格映射关系。</p>
            </div>
            <div class="table-toolbar">
              <button id="export-button" class="btn btn-secondary" type="button">导出当前结果</button>
            </div>
          </div>

          <div id="table-loading" class="table-loading hidden">
            <div class="loading-bar"></div>
            <span>正在查询数据，请稍候...</span>
          </div>

          <div class="table-scroll">
            <table class="report-table compact-table">
              <tbody id="report-tbody"></tbody>
            </table>
          </div>

          <div class="table-footer">
            <div class="footer-left">
              共 <strong id="footer-total">0</strong> 条
            </div>
            <div class="footer-right">
              <label class="page-size-wrapper">
                <select id="page-size-select">
                  <option value="30">30条/页</option>
                  <option value="50">50条/页</option>
                  <option value="100">100条/页</option>
                </select>
              </label>
              <button id="prev-page" class="pager-btn" type="button">‹</button>
              <div id="page-list" class="page-list"></div>
              <button id="next-page" class="pager-btn" type="button">›</button>
              <label class="goto-wrapper">
                前往
                <input id="goto-page" type="number" min="1" value="1" />
                页
              </label>
              <button id="goto-button" class="btn btn-mini" type="button">确定</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
